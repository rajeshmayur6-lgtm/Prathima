<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise Love Page ❤️</title>

<style>

body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:black;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial;
}

img{
    width:250px;
    border-radius:20px;
    box-shadow:0 0 30px red;
    z-index:2;
}

h1{
    color:white;
    margin-top:20px;
    font-size:40px;
    text-shadow:0 0 20px red;
    z-index:2;
}

button{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:30px;
    background:red;
    color:white;
    font-size:20px;
    cursor:pointer;
    box-shadow:0 0 20px red;
    z-index:2;
}

#message{
    display:none;
    color:pink;
    margin-top:20px;
    font-size:30px;
    text-align:center;
    z-index:2;
    text-shadow:0 0 15px pink;
}

audio{
    margin-top:20px;
    z-index:2;
}

.heart{
    position:absolute;
    top:-20px;
    color:red;
    font-size:25px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
    }
}

</style>
</head>

<body>

<img src="photo.jpg">

<h1>I Have a Surprise ❤️</h1>

<button onclick="showMessage()">Open Now 💌</button>

<div id="message">
    You Are My Favourite Person ❤️
</div>

<audio controls autoplay loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<script>

function showMessage(){
    document.getElementById("message").style.display = "block";
}

function createHeart(){

    const heart = document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";

    heart.style.animationDuration =
    (Math.random() * 3 + 2) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    },5000);
}

setInterval(createHeart,200);

</script>

</body>
</html>
